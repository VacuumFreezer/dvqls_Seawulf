  ansatz: brickwall_ry_cz
  epochs: 1000
  log_every: 5
  repeat_cz_each_layer: false
  local_ry_support: ""
  init_mode: uniform_pm_pi
  init_angle_center: 1.5707963267948966
  init_angle_noise_std: 0.05
  init_sigma_noise_std: 0.05
  init_lambda_noise_std: 0.05

lr_sets:
  - tag: lr1e-2
    lr: 0.01

decay_sets:
