shared:
  global_qubits: 13
  local_qubits: 13
  j_coupling: 0.1

optimize:
  kappa: 20.0
  forward_mode: dense_statevector
  gate_max_bond: null
  gate_cutoff: 0.0
  apply_max_bond: 64
  apply_cutoff: 1.0e-10
  apply_no_compress: true
  learning_rate: 0.02
  adam_beta1: 0.9
  adam_beta2: 0.999
  adam_epsilon: 1.0e-8
  iterations: 1000
  report_every: 2
  init_seed: 1234
  init_start: -3.141592653589793
  init_stop: 3.141592653589793
  sigma_init: 1.0
  lambda_init: 1.0
  preview_elements: 200

job_prep:
  default_tag: single_agent_ansatz_compare_13q
  default_cases:
    - basic_entangler_l2
    - basic_entangler_l7
    - hadamard_ry_cz_l7
  slurm:
    partition: long-40core-shared
    nodes: 1
    ntasks: 1
    cpus_per_task: 1
    mem: 16G
    time: 24:00:00

cases:
  basic_entangler_l2:
    ansatz: basic_entangler
    layers: 2

  basic_entangler_l7:
    ansatz: basic_entangler
    layers: 7

  hadamard_ry_cz_l7:
    ansatz: hadamard_ry_cz
    layers: 7
